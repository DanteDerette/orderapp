<script>

</script>

  .sidebar-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:999; display:none; opacity:0; pointer-events:none; transition:opacity 0.25s ease; }

  .main { margin-left:10%; width:90%; min-height:100vh; display:flex; flex-direction:column; }

  .sidebar-nav::-webkit-scrollbar-thumb { background:#ddd; border-radius:3px; }
  .sidebar-nav::-webkit-scrollbar-thumb:hover { background:#999; }
</style>

<script>
  (function(){
    function toggleSidebar(){
      var sb = document.querySelector('.sidebar');
      var ov = document.getElementById('sidebar-overlay');
      if(!sb || !ov) return;
      var opening = !sb.classList.contains('aberta');
      sb.classList.toggle('aberta');
      ov.classList.toggle('visivel');
      document.body.style.overflow = opening ? 'hidden' : '';
    }
    document.addEventListener('click', function(e){
      var btn = e.target.closest && e.target.closest('.btn-hamburger');
      if(btn){ e.preventDefault(); toggleSidebar(); }
    }, true);
    window.toggleSidebar = toggleSidebar;
    window.fecharSidebar = function(){
      var sb = document.querySelector('.sidebar');
      var ov2 = document.getElementById('sidebar-overlay');
      if(sb) sb.classList.remove('aberta');
      if(ov2) ov2.classList.remove('visivel');
      document.body.style.overflow = '';
    };

    // usa DOMContentLoaded para garantir que o overlay já existe no DOM
    document.addEventListener('DOMContentLoaded', function(){
      var ov = document.getElementById('sidebar-overlay');
      if(ov){
        ov.addEventListener('click', function(){
          window.fecharSidebar();
        });
      }
    });
  })();
</script>
