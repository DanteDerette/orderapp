<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <title>Checklist</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #faf5ff; min-height: 100vh; display: flex; }
    .main { margin-left: 10%; width: 90%; min-height: 100vh; display: flex; flex-direction: column; }
    html.mob .main { margin-left: 0 !important; width: 100% !important; }

    .main-header { background: #fff; border-bottom: 1px solid #eee; padding: 8px 20px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 5; }
    .main-header-titulo { font-size: 13px; font-weight: 700; color: #222; flex: 1; }
    .btn-hamburger { display: none; align-items: center; background: none; border: none; cursor: pointer; padding: 4px 6px; color: #1a1a1a; flex-shrink: 0; }
    html.mob .btn-hamburger { display: flex !important; }
    .btn-limpar { background: none; border: none; font-size: 11px; color: #bbb; cursor: pointer; font-family: inherit; padding: 4px 8px; border-radius: 6px; }
    .btn-limpar:hover { color: #e53935; background: #fff0f0; }

    .lista { padding: 16px 20px; display: flex; flex-direction: column; gap: 0; max-width: 640px; padding-bottom: 120px; }
    html.mob .lista { padding: 10px 12px; padding-bottom: 120px; }

    /* Item */
    .item { display: flex; align-items: center; gap: 12px; padding: 14px 0; border-bottom: 1px solid #f0f0f0; animation: _fadein .18s ease; }
    .item:last-child { border-bottom: none; }
    @keyframes _fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* Drag handle */
    .item-drag { color: #ccc; cursor: grab; padding: 2px 0; flex-shrink: 0; touch-action: none; display: flex; align-items: center; user-select: none; -webkit-user-select: none; }
    .item-drag:active { cursor: grabbing; color: #7c3aed; }
    .sortable-ghost { opacity: 0.4; background: #ede9fe; border-radius: 10px; }
    .sortable-drag { opacity: 0.9; box-shadow: 0 6px 20px rgba(124,58,237,.2); border-radius: 10px; background: #fff; }

    /* Checkbox custom */
    .item-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #ccc; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color .15s, background .15s; background: #fff; }
    .item-check.feito { border-color: #7c3aed; background: #7c3aed; }
    .item-check.feito svg { display: block; }
    .item-check svg { display: none; width: 12px; height: 12px; stroke: #fff; stroke-width: 3; fill: none; }

    /* Texto */
    .item-texto { flex: 1; font-size: 15px; color: #222; line-height: 1.4; word-break: break-word; cursor: pointer; border-radius: 4px; padding: 2px 4px; margin: -2px -4px; transition: background .12s; }
    .item-texto:hover { background: #f3e8ff; }
    .item-texto.feito { color: #bbb; text-decoration: line-through; }
    .item-texto.feito:hover { background: #f5f5f5; }

    /* Input de edição inline */
    .item-edit-input { flex: 1; border: none; border-bottom: 2px solid #7c3aed; outline: none; font-size: 15px; font-family: inherit; color: #222; background: transparent; padding: 2px 4px; margin: -2px -4px; }

    /* Input de nova tarefa */
    .item-input { flex: 1; border: none; outline: none; font-size: 15px; font-family: inherit; color: #222; background: transparent; }
    .item-input::placeholder { color: #ccc; }

    .item-del { background: none; border: none; cursor: pointer; padding: 4px 6px; color: #ddd; flex-shrink: 0; border-radius: 6px; display: flex; align-items: center; transition: color .15s; }
    .item-del:hover { color: #e53935; }

    /* FAB */
    .fab { position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 88px); right: 24px; width: 56px; height: 56px; border-radius: 50%; background: #7c3aed; color: #fff; border: none; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 20px rgba(124,58,237,.35); cursor: pointer; z-index: 500; transition: transform .15s; -webkit-tap-highlight-color: transparent; }
    .fab:active { transform: scale(0.92); }

    .vazio { padding: 60px 20px; text-align: center; color: #ccc; font-size: 14px; }

    .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 999; display: none; opacity: 0; pointer-events: none; transition: opacity .25s ease; }
    html.mob .sidebar-overlay { display: block; }
    .sidebar-overlay.visivel { opacity: 1; pointer-events: auto; }
  </style>
  <script>(function(){var mob=window.innerWidth<1024||/Android|iPhone|iPad|iPod|Mobile|webOS/i.test(navigator.userAgent)||navigator.maxTouchPoints>1;if(mob)document.documentElement.classList.add('mob');})()</script>
</head>
<body>
  {% set pagina_ativa = 'checklist' %}
  {% include '_sidebar.html' %}
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="main">
    <div class="main-header">
      <button class="btn-hamburger" aria-label="Menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="main-header-titulo">Checklist</span>
      <button class="btn-limpar" id="btn-limpar" style="display:none" onclick="limparConcluidas()">Limpar concluídas</button>
    </div>

    <div class="lista" id="lista">
      {% if tarefas %}
        {% for t in tarefas %}
        <div class="item" id="item-{{ t.id }}">
          <div class="item-drag" title="Arrastar para reordenar">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
              <circle cx="4" cy="3" r="1.5"/><circle cx="10" cy="3" r="1.5"/>
              <circle cx="4" cy="7" r="1.5"/><circle cx="10" cy="7" r="1.5"/>
              <circle cx="4" cy="11" r="1.5"/><circle cx="10" cy="11" r="1.5"/>
            </svg>
          </div>
          <div class="item-check {% if t.feito %}feito{% endif %}" onclick="toggle({{ t.id }}, this)">
            <svg viewBox="0 0 12 12"><polyline points="1.5,6 4.5,9.5 10.5,2.5"/></svg>
          </div>
          <span class="item-texto {% if t.feito %}feito{% endif %}">{{ t.texto }}</span>
          <button class="item-del" onclick="excluir({{ t.id }})" aria-label="Excluir">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        {% endfor %}
      {% else %}
        <div class="vazio" id="vazio">Nenhuma tarefa ainda. Toque em + para começar.</div>
      {% endif %}
    </div>
  </div>

  <button class="fab" onclick="novaItem()" aria-label="Nova tarefa">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script>
    // ── Utilidades ──────────────────────────────────────────────
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function dragHandleHTML() {
      return '<div class="item-drag" title="Arrastar para reordenar">' +
               '<svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">' +
                 '<circle cx="4" cy="3" r="1.5"/><circle cx="10" cy="3" r="1.5"/>' +
                 '<circle cx="4" cy="7" r="1.5"/><circle cx="10" cy="7" r="1.5"/>' +
                 '<circle cx="4" cy="11" r="1.5"/><circle cx="10" cy="11" r="1.5"/>' +
               '</svg>' +
             '</div>';
    }

    function itemHTML(id, texto, feito) {
      return dragHandleHTML() +
             '<div class="item-check' + (feito ? ' feito' : '') + '" onclick="toggle(' + id + ', this)">' +
               '<svg viewBox="0 0 12 12"><polyline points="1.5,6 4.5,9.5 10.5,2.5"/></svg>' +
             '</div>' +
             '<span class="item-texto' + (feito ? ' feito' : '') + '">' + esc(texto) + '</span>' +
             '<button class="item-del" onclick="excluir(' + id + ')" aria-label="Excluir">' +
               '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
             '</button>';
    }

    // Retorna o primeiro item concluído da lista (âncora para inserir antes dele)
    function primeiroFeito() {
      return Array.from(document.querySelectorAll('#lista .item')).find(function(el) {
        return el.querySelector('.item-check.feito');
      }) || null;
    }

    // Insere div antes dos concluídos (ou no final da lista)
    function inserirAntesDeFeitos(div) {
      var lista = document.getElementById('lista');
      var ancora = primeiroFeito();
      if (ancora) lista.insertBefore(div, ancora);
      else lista.appendChild(div);
      div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ── Botão Limpar concluídas ─────────────────────────────────
    function atualizarBtnLimpar() {
      var n = document.querySelectorAll('.item-check.feito').length;
      document.getElementById('btn-limpar').style.display = n > 0 ? '' : 'none';
    }
    atualizarBtnLimpar();

    function atualizarVazio() {
      var v = document.getElementById('vazio');
      if (!v) return;
      v.style.display = document.querySelectorAll('.item').length > 0 ? 'none' : '';
    }
    atualizarVazio();

    // ── Nova tarefa ─────────────────────────────────────────────
    function novaItem() {
      var old = document.getElementById('novo-input-item');
      if (old) { old.querySelector('input').focus(); return; }

      var div = document.createElement('div');
      div.className = 'item';
      div.id = 'novo-input-item';
      div.innerHTML =
        dragHandleHTML() +
        '<div class="item-check" style="cursor:default;opacity:.4"><svg viewBox="0 0 12 12"><polyline points="1.5,6 4.5,9.5 10.5,2.5"/></svg></div>' +
        '<input class="item-input" id="inp-novo" type="text" placeholder="Nova tarefa…" maxlength="500" autocomplete="off">' +
        '<button class="item-del" onclick="cancelarNovo()" aria-label="Cancelar">' +
          '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
        '</button>';

      inserirAntesDeFeitos(div);

      var v = document.getElementById('vazio');
      if (v) v.style.display = 'none';

      var inp = document.getElementById('inp-novo');
      inp.focus();
      inp.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); salvarNovo(); }
        if (e.key === 'Escape') cancelarNovo();
      });
      inp.addEventListener('blur', function() {
        setTimeout(function() { if (document.getElementById('inp-novo')) salvarNovo(); }, 150);
      });
    }

    function cancelarNovo() {
      var el = document.getElementById('novo-input-item');
      if (el) el.remove();
      atualizarVazio();
    }

    function salvarNovo() {
      var inp = document.getElementById('inp-novo');
      if (!inp) return;
      var texto = inp.value.trim();
      if (!texto) { cancelarNovo(); return; }

      fetch('/checklist/novo', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({texto: texto})
      })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (!d.ok) return;
        cancelarNovo();
        var div = document.createElement('div');
        div.className = 'item';
        div.id = 'item-' + d.id;
        div.innerHTML = itemHTML(d.id, d.texto, false);
        inserirAntesDeFeitos(div);
        atualizarVazio();
        atualizarBtnLimpar();
      });
    }

    // ── Edição inline (toque no texto) ──────────────────────────
    document.getElementById('lista').addEventListener('click', function(e) {
      var span = e.target.closest('.item-texto');
      if (!span) return;
      var item = span.closest('.item[id^="item-"]');
      if (!item) return;
      var id = parseInt(item.id.replace('item-', ''));
      editarTexto(id, span);
    });

    function editarTexto(id, span) {
      if (span.classList.contains('_editando')) return;
      span.classList.add('_editando');
      var textoAtual = span.textContent;
      var feito = span.classList.contains('feito');

      var inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'item-edit-input' + (feito ? ' feito' : '');
      inp.value = textoAtual;
      span.replaceWith(inp);
      inp.focus();
      inp.setSelectionRange(inp.value.length, inp.value.length);

      var salvo = false;
      function restaurar(novoTexto) {
        if (salvo) return;
        salvo = true;
        var novoSpan = document.createElement('span');
        novoSpan.className = 'item-texto' + (feito ? ' feito' : '');
        novoSpan.textContent = novoTexto;
        inp.replaceWith(novoSpan);
      }

      function salvar() {
        if (salvo) return;
        var novo = inp.value.trim();
        if (!novo || novo === textoAtual) { restaurar(textoAtual); return; }
        salvo = true;
        fetch('/checklist/' + id + '/editar', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({texto: novo})
        })
        .then(function(r) { return r.json(); })
        .then(function(d) { restaurar(d.ok ? d.texto : textoAtual); });
      }

      inp.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); salvar(); }
        if (e.key === 'Escape') restaurar(textoAtual);
      });
      inp.addEventListener('blur', function() { setTimeout(salvar, 150); });
    }

    // ── Toggle concluído ────────────────────────────────────────
    function toggle(id, chk) {
      fetch('/checklist/' + id + '/toggle', {method: 'POST'})
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (!d.ok) return;
          var item = document.getElementById('item-' + id);
          var texto = item.querySelector('.item-texto');
          if (d.feito) {
            chk.classList.add('feito');
            if (texto) texto.classList.add('feito');
            item.parentNode.appendChild(item);
          } else {
            chk.classList.remove('feito');
            if (texto) texto.classList.remove('feito');
            inserirAntesDeFeitos(item);
          }
          atualizarBtnLimpar();
        });
    }

    // ── Excluir ─────────────────────────────────────────────────
    function excluir(id) {
      fetch('/checklist/' + id + '/excluir', {method: 'POST'})
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (!d.ok) return;
          var el = document.getElementById('item-' + id);
          if (el) el.remove();
          atualizarVazio();
          atualizarBtnLimpar();
        });
    }

    // ── Limpar concluídas ───────────────────────────────────────
    function limparConcluidas() {
      fetch('/checklist/limpar-concluidas', {method: 'POST'})
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (!d.ok) return;
          document.querySelectorAll('.item-check.feito').forEach(function(chk) {
            chk.closest('.item').remove();
          });
          atualizarVazio();
          atualizarBtnLimpar();
        });
    }

    // ── Drag-and-drop (SortableJS) ──────────────────────────────
    Sortable.create(document.getElementById('lista'), {
      handle: '.item-drag',
      animation: 150,
      ghostClass: 'sortable-ghost',
      dragClass: 'sortable-drag',
      filter: '.vazio, #novo-input-item',
      preventOnFilter: false,
      onEnd: function() {
        var ids = Array.from(document.querySelectorAll('#lista .item[id^="item-"]'))
          .map(function(el) { return parseInt(el.id.replace('item-', '')); })
          .filter(function(id) { return !isNaN(id); });
        if (!ids.length) return;
        fetch('/checklist/reordenar', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ids: ids})
        });
      }
    });
  </script>
</body>
</html>
