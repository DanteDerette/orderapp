<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <title>Login — Order App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body { font-family: 'Segoe UI', sans-serif; background: #faf5ff; height: 100%; min-height: 100vh; min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.10); padding: 36px 32px; width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 20px; }
    .login-titulo { font-size: 20px; font-weight: 800; color: #1a1a1a; text-align: center; }
    .login-sub { font-size: 13px; color: #888; text-align: center; margin-top: -12px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-label { font-size: 10px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .4px; }
    .form-input { padding: 11px 14px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 14px; font-family: inherit; outline: none; color: #1a1a1a; transition: border-color .15s; background: #fff; -webkit-appearance: none; }
    .form-input:focus { border-color: #7c3aed; }
    .btn-entrar { padding: 13px; background: #7c3aed; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; transition: background .15s; -webkit-appearance: none; }
    .btn-entrar:hover, .btn-entrar:active { background: #6d28d9; }
    .erro-msg { background: #fff0f0; border: 1.5px solid #fcc; border-radius: 9px; padding: 10px 14px; font-size: 13px; color: #c00; font-weight: 600; text-align: center; }
  </style>
</head>
<body>
  <div class="login-card">
    <div>
      <div class="login-titulo">Order App</div>
      <div class="login-sub">Faça login para continuar</div>
    </div>
    {% if erro %}
    <div class="erro-msg">{{ erro }}</div>
    {% endif %}
    <form method="POST" action="/login" style="display:flex;flex-direction:column;gap:14px">
      <div class="form-group">
        <label class="form-label">Login</label>
        <input class="form-input" type="text" name="login" required autofocus autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input class="form-input" type="password" name="senha" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-entrar">Entrar</button>
    </form>
  </div>
</body>
</html>
